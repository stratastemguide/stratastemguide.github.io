<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinematics | IJSO Theory - Strata STEM Guide</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;700;900&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="../../../../../style.css">
    <link rel="stylesheet" href="../../../../../navbar.css">
    <link rel="stylesheet" href="../../ijso.css">

    <!-- KaTeX for Math Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"
        onload="renderMathInElement(document.body, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false},
                {left: '\\(', right: '\\)', display: false},
                {left: '\\[', right: '\\]', display: true}
            ],
            throwOnError: false
        });"></script>
</head>

<body class="physics-theme">
    <div class="grid-overlay"></div>
    <div class="bg-mesh">
        <div class="mesh-blob blob-1"></div>
        <div class="mesh-blob blob-2"></div>
        <div class="mesh-blob blob-3"></div>
    </div>

    <!-- Global Navbar logic -->
    <script src="../../../../../navbar.js"></script>
    <script>
        window.navbarConfig = { activePage: 'olympiad', rootPath: '../../../../../' };
    </script>
    <main class="theory-container" style="max-width: 1100px;">
        <div class="theory-hero reveal" style="text-align: left; margin-bottom: 0.5rem;">
            <br><br>
            <h1 style="font-size: 3rem; margin-bottom: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.2); display: block; padding-bottom: 1rem;">Kinematics</h1>
            
            <div style="display: flex; justify-content: flex-end; margin-top: 1.5rem;">
                <a href="../Mechanics.html" class="back-theory-btn" style="margin-top: 0; font-size: 0.9rem;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Back to Mechanics
                </a>
                <a href="../../Physics.html" class="back-to-path-btn" style="display: none; margin-top: 0;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Back to Path
                </a>
            </div>

            <script>
                // Context-aware navigation
                if (window.location.search.includes('mode=level')) {
                    const backUnitsBtn = document.querySelector('.back-theory-btn');
                    const backPathBtn = document.querySelector('.back-to-path-btn');
                    if (backUnitsBtn) backUnitsBtn.style.display = 'none';
                    if (backPathBtn) backPathBtn.style.display = 'inline-flex';
                }
            </script>
        </div>

        <div class="content-card reveal">
            <!-- Subtopics Menu -->
            <div class="topic-list reveal" style="margin-bottom: 3rem;">
                <a href="Kinematics/SpeedAndVelocity.html" class="topic-item">
                    <div style="display: flex; align-items: center; gap: 1.5rem;">
                        <div style="font-size: 1.5rem; opacity: 0.5; font-weight: 800;">01</div>
                        <h3>Speed and Velocity: The Physics of Motion</h3>
                    </div>
                    <div class="topic-arrow">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </div>
                </a>

                <a href="Kinematics/Acceleration.html" class="topic-item">
                    <div style="display: flex; align-items: center; gap: 1.5rem;">
                        <div style="font-size: 1.5rem; opacity: 0.5; font-weight: 800;">02</div>
                        <h3>The Complete Guide to Acceleration</h3>
                    </div>
                    <div class="topic-arrow">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </div>
                </a>
            </div>





            <!-- Completion Section -->
            <div class="completion-section reveal" style="margin-top: 3rem; text-align: center; padding: 2rem; background: rgba(255, 215, 0, 0.05); border-radius: 20px; border: 1px dashed rgba(255, 215, 0, 0.3);">
                <h3 style="font-family: 'Outfit', sans-serif; margin-bottom: 1rem;">Finished studying this topic?</h3>
                <p style="margin-bottom: 1.5rem; opacity: 0.8;">Mark it as completed to unlock the next level in your Physics journey!</p>
                <button id="completeBtn" class="complete-topic-btn">
                    <span class="btn-text">Mark as Completed</span>
                    <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </button>
                <p id="statusMsg" style="margin-top: 1rem; font-size: 0.9rem; font-weight: 500; display: none;"></p>
            </div>
        </div>
    </main>

    <style>
        .complete-topic-btn {
            background: linear-gradient(135deg, #ffd700, #ffae00);
            color: #000;
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center; gap: 10px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }

        .complete-topic-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.5);
        }

        .complete-topic-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .complete-topic-btn .check-icon {
            width: 20px;
            height: 20px;
            display: none;
        }

        .complete-topic-btn.is-completed {
            background: #22c55e;
            color: #fff;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
            cursor: default;
        }

        .complete-topic-btn.is-completed .check-icon {
            display: block;
        }

        .complete-topic-btn.is-completed:hover {
            transform: none;
        }

        .complete-topic-btn.loading {
            opacity: 0.7;
            pointer-events: none;
        }
    </style>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="../../../../../main.js"></script>

    <script type="module">
        import { auth, db } from '../../../../../firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { doc, getDoc, setDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const completeBtn = document.getElementById('completeBtn');
        const statusMsg = document.getElementById('statusMsg');
        const topicId = 'kinematics'; // Unique ID for this topic
        let currentUser = null;

        // Initialize State
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
            } else {
                currentUser = null;
                completeBtn.querySelector('.btn-text').innerText = 'Log in to Track Progress';
                completeBtn.style.opacity = '0.5';
                completeBtn.style.cursor = 'not-allowed';
            }
        });

        function markUIAsCompleted() {
            completeBtn.classList.add('is-completed');
            completeBtn.querySelector('.btn-text').innerText = 'Topic Completed ✨';
            statusMsg.innerText = "Awesome! You've mastered this topic.";
            statusMsg.style.display = 'block';
            statusMsg.style.color = '#22c55e';
            completeBtn.disabled = true;
        }

        completeBtn.addEventListener('click', async () => {
            if (!currentUser) {
                alert("Please log in to save your progress!");
                return;
            }
            if (completeBtn.classList.contains('is-completed')) return;

            completeBtn.classList.add('loading');
            completeBtn.querySelector('.btn-text').innerText = 'Saving Progress...';

            try {
                const docRef = doc(db, "userProgress", currentUser.uid);
                await setDoc(docRef, {
                    completedTopics: arrayUnion(topicId)
                }, { merge: true });

                markUIAsCompleted();
                
                // Optional: confetti
                if (window.confetti) {
                    window.confetti({
                        particleCount: 100,
                        spread: 70,
                        origin: { y: 0.6 },
                        colors: ['#ffd700', '#ffffff', '#22c55e']
                    });
                }
            } catch (error) {
                console.error("Error saving progress:", error);
                statusMsg.innerText = "Oops! Something went wrong. Please try again.";
                statusMsg.style.display = 'block';
                statusMsg.style.color = '#ef4444';
                completeBtn.querySelector('.btn-text').innerText = 'Mark as Completed';
            } finally {
                completeBtn.classList.remove('loading');
            }
        });
    </script>
</body>

</html>
